<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="icons/favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="icons/site.webmanifest">
  <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#0B1D39">
  <title>Painel do Avaliador</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #666666;
      --line: #dddddd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
    }

    button {
      appearance: none;
      border: 1px solid var(--fg);
      background: #fff;
      color: var(--fg);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #111;
      color: #fff;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
    }

    .ranking {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      background: #fff;
      margin-bottom: 22px;
    }

    .ranking-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .ranking-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .ranking-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ranking-table th,
    .ranking-table td {
      text-align: left;
      padding: 12px 10px;
      border-top: 1px solid #efefef;
      font-size: 14px;
      vertical-align: top;
    }

    .ranking-table thead th {
      border-top: none;
      padding-top: 4px;
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-weight: 700;
    }

    .list {
      display: grid;
      gap: 16px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      background: #fff;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .meta {
      font-size: 14px;
      line-height: 1.6;
    }

    .meta strong {
      font-weight: 700;
    }

    .time-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      min-width: 120px;
      text-align: center;
      font-size: 14px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #efefef;
    }

    .morse {
      font-size: 22px;
      letter-spacing: 0.08em;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .translated {
      font-size: 22px;
      font-weight: 700;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .ranking-table thead {
        display: none;
      }

      .ranking-table,
      .ranking-table tbody,
      .ranking-table tr,
      .ranking-table td {
        display: block;
        width: 100%;
      }

      .ranking-table tr {
        border-top: 1px solid #efefef;
        padding: 10px 0;
      }

      .ranking-table td {
        border-top: none;
        padding: 6px 0;
      }

      .morse,
      .translated {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Painel do Avaliador</h1>
    <div class="sub">
      Aqui aparecem as mensagens enviadas pelas equipes, com tempo, código Morse e tradução automática.
    </div>

    <div class="toolbar">
      <button id="reloadBtn" type="button">Atualizar</button>
      <button id="autoBtn" type="button">Autoatualizar: ligado</button>
      <div class="status" id="status">Carregando...</div>
    </div>

    <section class="ranking" id="rankingBox">
      <div class="ranking-head">
        <h2>Ranking de menor tempo</h2>
        <div class="ranking-sub">Top 10 menores tempos entre todos os envios.</div>
      </div>
      <div id="rankingContent">
        <div class="empty">Nenhum tempo registrado ainda.</div>
      </div>
    </section>

    <div class="list" id="list"></div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwL1TlYAqR4jQHMrYlgFr9mtWCF-uPXGUCA41CZngo--mtGj8B-WEgSN8gbT6Y7Xut1ww/exec';

    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    const reloadBtn = document.getElementById('reloadBtn');
    const autoBtn = document.getElementById('autoBtn');
    const rankingContentEl = document.getElementById('rankingContent');

    let autoRefresh = true;
    let intervalId = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDuration(seconds) {
      const total = Number(seconds || 0);
      const min = Math.floor(total / 60);
      const sec = total % 60;
      return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function renderRanking(items) {
      const validItems = (items || [])
        .filter(item => Number.isFinite(Number(item.duration_seconds)) && Number(item.duration_seconds) >= 0)
        .slice()
        .sort((a, b) => Number(a.duration_seconds) - Number(b.duration_seconds))
        .slice(0, 10);

      if (!validItems.length) {
        rankingContentEl.innerHTML = `
          <div class="empty">
            Nenhum tempo registrado ainda.
          </div>
        `;
        return;
      }

      rankingContentEl.innerHTML = `
        <table class="ranking-table">
          <thead>
            <tr>
              <th>Posição</th>
              <th>Equipe</th>
              <th>Tempo</th>
              <th>Enviado em</th>
              <th>Tradução</th>
            </tr>
          </thead>
          <tbody>
            ${validItems.map((item, index) => `
              <tr>
                <td><span class="rank-badge">${index + 1}º</span></td>
                <td>${escapeHtml(item.class_name || '-')}</td>
                <td><strong>${formatDuration(item.duration_seconds)}</strong></td>
                <td>${escapeHtml(item.timestamp || '')}</td>
                <td>${escapeHtml(item.translated_text || '')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderItems(items) {
      if (!items || !items.length) {
        listEl.innerHTML = `
          <div class="empty">
            Nenhuma mensagem encontrada.
          </div>
        `;
        return;
      }

      listEl.innerHTML = items.map(item => `
        <div class="card">
          <div class="card-top">
            <div class="meta">
              <div><strong>Equipe:</strong> ${escapeHtml(item.class_name || '')}</div>
              <div><strong>Enviado em:</strong> ${escapeHtml(item.timestamp || '')}</div>
            </div>

            <div class="time-box">
              <div class="label">Tempo</div>
              <div><strong>${formatDuration(item.duration_seconds)}</strong></div>
            </div>
          </div>

          <div class="block">
            <div class="label">Código Morse</div>
            <div class="morse">${escapeHtml(item.morse_text || '')}</div>
          </div>

          <div class="block">
            <div class="label">Tradução</div>
            <div class="translated">${escapeHtml(item.translated_text || '')}</div>
          </div>
        </div>
      `).join('');
    }

    function loadData() {
      statusEl.textContent = 'Carregando...';

      const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      window[callbackName] = function(data) {
        try {
          if (!data || !data.ok) {
            statusEl.textContent = 'Erro ao carregar dados.';
            rankingContentEl.innerHTML = `
              <div class="empty">
                Falha ao carregar o ranking.
              </div>
            `;
            listEl.innerHTML = `
              <div class="empty">
                Falha ao carregar os dados.
              </div>
            `;
            return;
          }

          const items = data.items || [];
          renderRanking(items);
          renderItems(items);
          statusEl.textContent = `Atualizado. Registros: ${items.length}`;
        } finally {
          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
        }
      };

      const oldScript = document.getElementById('jsonpScript');
      if (oldScript) oldScript.remove();

      const script = document.createElement('script');
      script.id = 'jsonpScript';
      script.src = `${GAS_URL}?mode=list&callback=${callbackName}&_=${Date.now()}`;

      script.onerror = function() {
        statusEl.textContent = 'Erro ao conectar com o Apps Script.';
        rankingContentEl.innerHTML = `
          <div class="empty">
            Não foi possível carregar o ranking.
          </div>
        `;
        listEl.innerHTML = `
          <div class="empty">
            Não foi possível carregar os dados do avaliador.
          </div>
        `;
        try {
          delete window[callbackName];
        } catch (e) {
          window[callbackName] = undefined;
        }
      };

      document.body.appendChild(script);
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      intervalId = setInterval(() => {
        if (autoRefresh) loadData();
      }, 5000);
    }

    function stopAutoRefresh() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    reloadBtn.addEventListener('click', loadData);

    autoBtn.addEventListener('click', () => {
      autoRefresh = !autoRefresh;
      autoBtn.textContent = `Autoatualizar: ${autoRefresh ? 'ligado' : 'desligado'}`;
    });

    loadData();
    startAutoRefresh();
  </script>
</body>
</html>
